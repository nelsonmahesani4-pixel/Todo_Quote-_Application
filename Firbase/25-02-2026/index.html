<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Firebase Email Authentication</h1>
  <div class="container">
    <div class="panel">
    <!-- Signup -->
    <h2>Sign Up</h2>
    <input type="email" id="semail" placeholder="Email">
    <input type="password" id="spassword" placeholder="Password">
    <button id="signupBtn">Sign Up</button>
  </div>
  <p id="text"></p>
  <div class="panel">
    <!-- Login -->
    <h2>Sign In</h2>
    <input type="email" id="lemail" placeholder="Email">
    <input type="password" id="lpassword" placeholder="Password">
    <button id="signinBtn">Sign In</button>
    <button id="logoutBtn">Logout</button>
  </div>


  </div>
  <!--  Continue With Google -->
    <button style="background-color: #4285F4; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer;" id="googleBtn">
  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" 
       alt="Google" style="width:20px; vertical-align: middle; margin-right: 8px;">
  Continue with Google
</button>

  <!-- Firebase JS File -->
  <script type="module" src="./index.js"></script>
</body>
</html>
