<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Store Database</title>
</head>

<style>
  /* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

/* Body */
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Main Heading */
h1 {
  position: absolute;
  top: 20px;
  color: #fff;
  font-size: 28px;
}

/* App Container */
.container {
  background: #ffffff;
  width: 100%;
  max-width: 450px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

/* App Title */
.container h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

/* Input + Button Wrapper */
.input-main-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

/* Input */
.input-group {
  flex: 1;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 15px;
  outline: none;
}

.input-group input:focus {
  border-color: #667eea;
}

/* Button */
#addBtn {
  padding: 12px 18px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  transition: 0.3s;
}

#addBtn:hover {
  background: #5a67d8;
}

/* Quotes List */
#quoteList {
  list-style: none;
}

#quoteList li {
  background: #f4f4f4;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 14px;
}

/* 📱 Mobile Responsive */
@media (max-width: 480px) {
  h1 {
    font-size: 22px;
  }

  .input-main-group {
    flex-direction: column;
  }

  #addBtn {
    width: 100%;
  }
}
</style>

<body>
  <h1>Fire Store Database</h1>

      <div class="container">
  <h2>My Quotes App</h2>

  <div class="input-main-group">
    <div class="input-group">
    <input type="text" placeholder="Enter your quote" id="quoteInput" />
  </div>
    <button id="addBtn">Add</button>
  </div>

  <ul id="quoteList"></ul>
</div>



    <script src="./firestore.js" type="module"></script>
</body>
</html>
